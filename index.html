<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VRads - Premium AR HUD</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-black">

  <div class="hud-scanlines"></div>

  <!-- HUD Overlay - Absolute Anchors -->
  <div id="mobile-ui" class="transition-all-premium">
    <!-- PANEL: STATUS (TOP LEFT) -->
    <div class="hud-panel hud-panel-tl glass-panel">
      <div class="hud-corner hud-tl"></div><div class="hud-corner hud-tr"></div>
      <div class="hud-corner hud-bl"></div><div class="hud-corner hud-br"></div>
      <div id="m-status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 pulse-primary"></div>
      <span id="m-status-label" class="label-xs text-white">Initializing...</span>
    </div>

    <!-- PANEL: STATS (TOP RIGHT) -->
    <div id="mobile-stats" class="hud-panel hud-panel-tr glass-panel min-w-[140px] opacity-0 transition-all-premium">
      <div class="hud-corner hud-tl"></div><div class="hud-corner hud-tr"></div>
      <div class="hud-corner hud-bl"></div><div class="hud-corner hud-br"></div>
      <p class="metrics-label mb-1">Environmental Gain</p>
      <div class="metrics-value">
        PLAS: <span id="m-plastic" class="font-bold text-cyan-400">0</span>g<br>
        ENRG: <span id="m-energy" class="font-bold text-cyan-400">0</span>W
      </div>
    </div>

    <!-- PANEL: ACTION (BOTTOM CENTER) -->
    <div class="hud-panel hud-panel-bc">
      <p class="label-xs text-white/30 animate-pulse tracking-[0.5em] mb-4">Touch to Reclamation</p>
      <button id="mobile-toggle-btn"
        class="pointer-events-auto relative w-full py-4 glass-panel rounded-full text-white font-black uppercase tracking-[0.3em] text-[10px] shadow-2xl active:scale-95 transition-all overflow-hidden border border-white/5">
        <div id="btn-color-bg" class="absolute inset-0 bg-[#ff0044] opacity-80"></div>
        <span class="relative z-10" id="mobile-btn-label">Purge Noise</span>
      </button>
    </div>
  </div>

  <a-scene
    arjs="sourceType: webcam; sourceWidth: 640; sourceHeight: 480; displayWidth: 640; displayHeight: 480; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    xr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
    background="transparent: true">

    <a-assets>
      <img id="coke-img" src="coke.jpg" crossorigin="anonymous">
    </a-assets>

    <a-marker id="hiro-marker" preset="hiro">
      <a-entity rotation="-90 0 0">
        <a-entity class="ad-poc-content">
          <a-box position="0 0.85 -0.05" width="3" height="1.7" depth="0.1" color="#000" material="shader: flat"></a-box>
          <a-image src="#coke-img" position="0 0.85 0.01" width="3" height="1.7"></a-image>
        </a-entity>
        <a-entity class="clean-layer-content" visible="false">
          <a-entity scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            <a-sphere radius="1.3" color="#00e5ff" material="opacity: 0.2; transparent: true"></a-sphere>
            <a-torus-knot radius="0.8" color="#00e5ff"></a-torus-knot>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-camera position="0 0 0"></a-camera>
  </a-scene>

  <div id="init-overlay" class="fixed inset-0 z-[100000] bg-[#0a0f19] flex items-center justify-center p-8 transition-opacity duration-800">
    <div class="text-center">
      <h1 class="text-white text-4xl font-black mb-1 italic tracking-tighter">VRads</h1>
      <div class="w-10 h-0.5 bg-cyan-400 mx-auto mb-10"></div>
      <button id="start-btn" class="px-14 py-4 bg-white text-black font-black uppercase tracking-[0.2em] rounded-full text-[11px] shadow-2xl active:scale-95 transition-all">Authorize Link</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
