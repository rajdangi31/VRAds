<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VRads - Premium AR HUD</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="m-0 overflow-hidden select-none bg-black">

  <div class="hud-scanlines"></div>

  <!-- AR Scene -->
  <!-- Re-enforcing source dimensions for better scaling fallback -->
  <a-scene
    arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720; debugUIEnabled: false; trackingMethod: best; detectionMode: mono_and_matrix;"
    webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay, image-tracking; overlayElement: #mobile-ui"
    xr-mode-ui="XRMode: ar" ar-hit-test="target: #spatial-anchor; type: footprint"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; colorManagement: true;"
    background="transparent: true" webxr-image-tracker>

    <a-assets>
      <img id="coke-img" src="coke.jpg" crossorigin="anonymous">
    </a-assets>

    <a-entity id="spatial-anchor" visible="false"></a-entity>

    <a-marker id="hiro-marker" preset="hiro" smooth="true" smoothCount="10">
      <a-entity rotation="-90 0 0">
        <a-entity class="ad-poc-content">
          <a-box position="0 0.85 -0.05" width="3.2" height="1.8" depth="0.1" color="#000" material="shader: flat"></a-box>
          <a-image src="#coke-img" position="0 0.85 0.01" width="3.2" height="1.8" class="neon-flicker" material="side: double"></a-image>
        </a-entity>
        <a-entity class="clean-layer-content" visible="false">
          <a-entity scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            <a-sphere radius="1.3" color="#00e5ff" material="opacity: 0.15; transparent: true; side: back"></a-sphere>
            <a-torus-knot radius="0.8" radius-tubular="0.08" p="3" q="7" color="#00e5ff"></a-torus-knot>
            <a-sphere radius="0.4" color="#ffffff" material="opacity: 0.9"></a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity id="webxr-image-target" visible="false"></a-entity>

    <a-entity id="quest-spatial-hud" visible="false">
      <a-entity position="0 0.3 -1">
        <a-plane width="0.8" height="0.3" material="color: #000; opacity: 0.6; transparent: true">
          <a-text id="q-status-text" value="" align="center" width="1.2" font="mozillavr"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <a-camera></a-camera>
  </a-scene>

  <!-- Mobile HUD -->
  <div id="mobile-ui" class="fixed inset-0 transition-all-premium">
    <!-- Top Bar -->
    <div class="hud-top-bar">
      <div id="mobile-status-panel" class="glass-panel p-3 px-4 rounded-xl flex items-center gap-3">
        <div class="hud-corner hud-tl"></div><div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div><div class="hud-corner hud-br"></div>
        <div id="m-status-dot" class="status-dot w-2 h-2 rounded-full bg-red-500 pulse-primary"></div>
        <span id="m-status-label" class="status-label text-white">Initializing...</span>
      </div>

      <div id="mobile-stats" class="glass-panel p-3 px-4 rounded-xl min-w-[140px] opacity-0 transition-all-premium">
        <div class="hud-corner hud-tl"></div><div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div><div class="hud-corner hud-br"></div>
        <p class="metrics-label mb-1">Environmental Gain</p>
        <div class="metrics-value text-white/90">
          PLAS: <span id="m-plastic" class="text-cyan-400">0</span>g<br>
          ENRG: <span id="m-energy" class="text-cyan-400">0</span>W
        </div>
      </div>
    </div>

    <!-- Spacer to push content to extremes -->
    <div class="flex-grow"></div>

    <!-- Bottom Controls -->
    <div class="pb-8 flex flex-col items-center gap-4">
      <p class="text-[8px] uppercase tracking-[0.5em] text-white/30 font-bold animate-pulse">Touch to Reclamation</p>
      <button id="mobile-toggle-btn"
        class="pointer-events-auto relative w-[85vw] max-w-[280px] py-4 glass-panel rounded-full text-white font-black uppercase tracking-[0.3em] text-[10px] shadow-[0_0_30px_rgba(255,0,68,0.3)] border border-white/10 active:scale-95 transition-all overflow-hidden group">
        <div id="btn-color-bg" class="absolute inset-0 bg-[#ff0044] opacity-80 group-active:opacity-100 transition-all"></div>
        <span class="relative z-10" id="mobile-btn-label">Purge Noise</span>
      </button>
    </div>
  </div>

  <!-- Initial Authorization -->
  <div id="init-overlay" class="fixed inset-0 z-[3000] bg-[#0a0f19] flex items-center justify-center p-8 transition-opacity duration-1000">
    <div class="text-center">
      <h1 class="text-white text-5xl font-black mb-2 italic tracking-tighter">VRads</h1>
      <div class="w-12 h-1 bg-cyan-400 mx-auto mb-10"></div>
      <button id="start-btn" class="px-14 py-4 bg-white text-black font-black uppercase tracking-[0.2em] rounded-full text-xs shadow-2xl active:scale-95 transition-all">Authorize Link</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
