<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>VRads - Premium AR HUD</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body class="m-0 overflow-hidden select-none bg-transparent">

  <div class="hud-scanlines"></div>

  <a-scene arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; detectionMode: mono_and_matrix;"
    webxr="requiredFeatures: local-floor, passthrough, hit-test;" xr-mode-ui="XRMode: ar"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; colorManagement: true;">

    <a-assets>
      <img id="coke-img" src="coke.jpg">
    </a-assets>

    <a-entity id="xr-controls" visible="false">
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 5;"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 5;"></a-entity>
    </a-entity>

    <a-marker id="hiro-marker" preset="hiro" smooth="false">
      <a-entity class="ad-poc-content">
        <!-- Opaque base to mask the Hiro marker — slightly larger than the ~1.7 unit marker -->
        <a-box position="0 0.005 0" width="2.2" height="0.01" depth="2.2" color="#111111"
          material="shader: flat; side: double; opacity: 1.0; transparent: false">
        </a-box>

        <!-- Ad image sitting clearly above the base to avoid z-fighting -->
        <a-image src="#coke-img" position="0 0.025 0" rotation="-90 0 0" width="2.0" height="2.0" class="neon-flicker"
          material="side: double; transparent: true; opacity: 1.0">
        </a-image>
      </a-entity>

      <a-entity class="clean-layer-content" visible="false">
        <a-entity position="0 0.2 0" scale="0.4 0.4 0.4"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere radius="1.3" color="#00e5ff" material="opacity: 0.15; transparent: true; side: back"></a-sphere>
          <a-torus-knot radius="0.8" radius-tubular="0.08" p="3" q="7" color="#00e5ff"
            material="metalness: 0.8; roughness: 0.2"></a-torus-knot>
          <a-sphere radius="0.4" color="#ffffff" material="opacity: 0.9"></a-sphere>
        </a-entity>
        <a-ring radius-inner="0.4" radius-outer="0.5" color="#00e5ff" position="0 0.02 0" rotation="-90 0 0"
          material="opacity: 0.4; transparent: true"></a-ring>
      </a-entity>
    </a-marker>

    <a-entity id="world-content" visible="false">
      <a-entity class="ad-poc-content" position="0 1.5 -3">
        <a-plane position="0 0.01 0" rotation="0 0 0" width="3.2" height="1.7" color="#000"
          material="opacity: 0.6; transparent: true"></a-plane>
        <a-image src="#coke-img" position="0 0.01 0" rotation="0 0 0" width="3" height="1.6" class="neon-flicker"
          animation="property: position; to: 0 0.6 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        </a-image>
      </a-entity>

      <a-entity class="clean-layer-content" visible="false" position="0 1.5 -3">
        <a-entity position="0 0.8 0" scale="0.6 0.6 0.6"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere radius="1.3" color="#00e5ff" material="opacity: 0.15; transparent: true; side: back"></a-sphere>
          <a-torus-knot radius="0.8" radius-tubular="0.08" p="3" q="7" color="#00e5ff"
            material="metalness: 0.8; roughness: 0.2"></a-torus-knot>
          <a-sphere radius="0.4" color="#ffffff" material="opacity: 0.9"></a-sphere>
        </a-entity>
        <a-ring radius-inner="1.2" radius-outer="1.3" color="#00e5ff" position="0 0.02 0" rotation="-90 0 0"
          material="opacity: 0.4; transparent: true"></a-ring>
      </a-entity>
    </a-entity>

    <a-entity id="xr-content" position="0 0 -2" visible="false">
      <a-entity class="ad-poc-content">
        <a-image src="#coke-img" position="0 0.6 0" width="2.5" height="1.4"></a-image>
      </a-entity>
      <a-entity class="clean-layer-content" visible="false">
        <a-entity position="0 0.6 0" scale="0.8 0.8 0.8"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          <a-sphere radius="1.3" color="#00e5ff" material="opacity: 0.2; transparent: true; side: back"></a-sphere>
          <a-torus-knot radius="0.8" radius-tubular="0.1" p="3" q="7" color="#00e5ff"
            material="metalness: 0.9; roughness: 0.1"></a-torus-knot>
        </a-entity>
      </a-entity>

      <a-entity id="xr-ui-panel" position="0.5 0.01 0.5" rotation="0 -35 0">
        <a-plane width="1.2" height="0.8" color="#0a0f19" material="opacity: 0.85; transparent: true"
          rounded="0.1"></a-plane>
        <a-entity class="clickable" onclick="app.toggleMode()" position="0 -0.01 0.05" id="xr-main-btn">
          <a-plane width="0.8" height="0.15" color="#ff0044" material="opacity: 0.9" class="btn-mesh"></a-plane>
          <a-text value="PURGE NOISE" align="center" width="2" position="0 0 0.02" class="btn-label"
            font="mozillavr"></a-text>
        </a-entity>
        <a-entity class="data-display" position="0 0.01 0.05" visible="false">
          <a-text value="THE CLEAN LAYER" color="#00e5ff" align="center" width="2.8" position="0 0.01 0"
            font="mozillavr"></a-text>
          <a-text class="metric-plastic" value="Plastic: 0g" color="white" align="center" width="1.8"
            position="0 0.05 0" font="mozillavr"></a-text>
          <a-text class="metric-energy" value="Energy: 0W" color="white" align="center" width="1.8" position="0 -0.05 0"
            font="mozillavr"></a-text>
        </a-entity>
      </a-entity>
    </a-entity>

    <a-entity camera position="0 1.6 0"></a-entity>
  </a-scene>

  <div id="mobile-ui" class="fixed inset-0 pointer-events-none z-[2000] flex flex-col p-6 transition-all-premium">

    <div class="flex justify-between items-start w-full">
      <div class="glass-panel p-3 px-4 rounded-xl flex items-center gap-3">
        <div class="hud-corner hud-tl"></div>
        <div class="hud-corner hud-tr"></div>
        <div class="hud-corner hud-bl"></div>
        <div class="hud-corner hud-br"></div>
        <div id="m-status-dot" class="status-dot bg-red-500 pulse-primary"></div>
        <span id="m-status-label"
          class="text-[10px] uppercase tracking-[0.25em] text-white/70 font-bold">Initializing...</span>
      </div>

      <div id="mobile-stats" class="opacity-0 transition-all-premium">
        <div class="glass-panel p-3 px-4 rounded-xl flex flex-col items-end min-w-[120px]">
          <div class="hud-corner hud-tl"></div>
          <div class="hud-corner hud-tr"></div>
          <div class="hud-corner hud-bl"></div>
          <div class="hud-corner hud-br"></div>
          <p class="text-[8px] uppercase tracking-[0.3em] text-cyan-400 mb-1 font-black">Environmental Gain</p>
          <div class="font-mono text-[11px] text-white flex flex-col items-end">
            <span>PLASTIC: <span id="m-plastic" class="font-black text-cyan-300">0</span>g</span>
            <span>ENERGY: <span id="m-energy" class="font-black text-cyan-300">0</span>W</span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex-grow flex items-center justify-center pointer-events-none opacity-20">
      <div class="w-16 h-16 border border-white/20 rounded-full flex items-center justify-center">
        <div class="w-1 h-1 bg-white/40 rounded-full"></div>
      </div>
    </div>

    <div class="w-full flex flex-col items-center gap-4 py-8">
      <p class="text-[8px] uppercase tracking-[0.5em] text-white/30 font-bold animate-pulse">Touch to Reclamation</p>
      <button id="mobile-toggle-btn"
        class="pointer-events-auto relative w-full max-w-[260px] py-4 glass-panel rounded-full text-white font-black uppercase tracking-[0.3em] text-[10px] shadow-[0_0_30px_rgba(255,0,68,0.3)] active:scale-95 active:shadow-none transition-all-premium border border-white/10 overflow-hidden group">
        <div id="btn-color-bg" class="absolute inset-0 bg-[#ff0044] opacity-80 group-active:opacity-100 transition-all">
        </div>
        <span class="relative z-10" id="mobile-btn-label">Purge Noise</span>
      </button>
    </div>
  </div>

  <div id="init-overlay"
    class="fixed inset-0 z-[3000] bg-[#0a0f19] flex items-center justify-center p-8 transition-opacity duration-1000">
    <div class="text-center">
      <h1 class="text-white text-5xl font-black mb-2 tracking-tighter italic scale-110">VRads</h1>
      <div class="w-24 h-1 bg-cyan-400 mx-auto mb-8 shadow-[0_0_15px_rgba(0,229,255,0.8)]"></div>
      <p class="text-white/40 text-[10px] uppercase tracking-[0.4em] mb-12 leading-relaxed">System Link Authorization
        Required</p>
      <button id="start-btn"
        class="px-16 py-5 bg-white text-black font-black uppercase tracking-[0.25em] rounded-full hover:bg-cyan-400 transition-all shadow-[0_0_40px_rgba(255,255,255,0.2)] active:scale-95 text-xs">Authorize
        Link</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
